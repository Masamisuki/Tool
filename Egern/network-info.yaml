# ==========================================
# 网络信息监控小组件模块
# 作者: Masamisuki
# 脚本来源: GitHub Remote
# ==========================================

scriptings:
  - generic:
      name: "network-info-widget"
      # 🔗 使用远程脚本链接 (请确保这是 Raw 链接)
      # 格式: https://raw.githubusercontent.com/用户名/仓库名/分支名/文件路径
      script_url: "https://raw.githubusercontent.com/Masamisuki/Tool/main/Egern/network-info-widget.js"
      
      # 💡 如果上面的链接无法加载，请检查:
      # 1. 仓库是否是公开的 (Public)
      # 2. 分支名是否正确 (main / master)
      # 3. 文件路径是否完全匹配
      # 4. 尝试将 /blob/ 替换为 / 或直接使用 raw 域名

widgets:
  - name: "🌐 网络信息监控"
    script_name: "network-info-widget"
    
    # ⏱️ 刷新间隔 (秒)
    # 建议设置为 180-600 秒，避免频繁请求 API 被限制
    refresh_time: 300
    
    # 📱 支持的小组件尺寸
    families:
      - systemSmall
      - systemMedium
      - systemLarge
    
    # 🎨 默认背景色 (如果脚本中未定义)
    background_color: "#0f0c29"
