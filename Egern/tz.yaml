name: 插件模块跳转
description: |
  支持 Kelee 插件中心、色鸡模块以及 LoonLab 插件中心跳转至 Egern。
  Kelee 插件：https://hub.kelee.one
  色鸡模块：https://surge.qingr.moe
  LoonLab：https://loonlab.103516.xyz
homepage: https://hub.kelee.one
body_rewrites:
  - response_regex:
      # 增加对 loonlab.103516.xyz 的匹配
      match: https://(pluginhub|hub)\.kelee\.one/|https://loonlab\.103516\.xyz/
      find: loon://import\?plugin=
      replace: egern:///modules/new?url=
  - response_regex:
      match: https://surge\.qingr\.moe/
      find: surge:///install-module\?url=
      replace: egern:///modules/new?url=
mitm:
  hostnames:
    includes:
      - pluginhub.kelee.one
      - hub.kelee.one
      - surge.qingr.moe
      - loonlab.103516.xyz
