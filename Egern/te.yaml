name: "网络链路信息组件"
description: "仿 net-lsp-x 效果，展示本地及落地 IP 信息"

scriptings:
  - schedule:
      name: "network_check_task"
      cron: "*/5 * * * *" # 每5分钟自动更新
      script_url: "https://你的脚本地址/network_info.js" # 替换为你的脚本链接
      timeout: 10

widgets:
  - script:
      name: "网络信息"
      title: "链路追踪"
      script_name: "network_check_task"
      update_interval: 60
