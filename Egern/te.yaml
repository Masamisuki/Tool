name: "网络信息增强小组件 (Pro)"
description: "实时显示本地出口 IP、中转入口、落地 IP 及节点信息。适配 Egern 小组件 UI。"

scriptings:
  - schedule:
      name: "network_info_pro_task"
      cron: "*/5 * * * *"
      script_url: "https://raw.githubusercontent.com/Masamisuki/Tool/main/Egern/network-info-pro.js"
      timeout: 15

widgets:
  - script:
      name: "网络追踪 Pro"
      title: "链路信息"
      script_name: "network_info_pro_task"
      update_interval: 60
