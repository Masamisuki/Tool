name: Auto Update Ads_SukkaW & Replace Quotes

on:
  schedule:
    # 每天 UTC 23:00 执行
    - cron: '0 15 * * *'
  workflow_dispatch:    # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download upstream file and process
        run: |
          set -euo pipefail

          # 下载到临时目录，避免污染仓库
          curl -fsSL "https://raw.githubusercontent.com/Repcz/Tool/refs/heads/X/Egern/Rules/Ads_SukkaW.yaml" -o /tmp/upstream.yaml

          # 确保输出目录存在
          mkdir -p Egern/Rules

          # Python 处理：只在 url_regex_set 块里把双引号改为单引号
          python3 - <<'EOF'
          import re
          import os

          INPUT_FILE  = "/tmp/upstream.yaml"
          OUTPUT_FILE = "Egern/Rules/Ads_SukkaW.yaml"

          lines = []
          in_block = False

          with open(INPUT_FILE, encoding="utf-8") as f:
              for line in f:
                  stripped = line.rstrip("\n")

                  if stripped.startswith("url_regex_set:"):
                      in_block = True
                      lines.append(stripped)
                      continue

                  if in_block:
                      # 匹配严格的双引号格式：  - "内容"
                      match = re.match(r'^(\s*-\s*)"([^"]*)"$', stripped)
                      if match:
                          indent = match.group(1)
                          content = match.group(2)
                          # 强制改为单引号，保留原始缩进
                          new_line = f"{indent}'{content}'"
                          lines.append(new_line)
                      else:
                          # 非目标行（注释、空行、其他格式）保持原样
                          lines.append(stripped)
                          # 判断块是否结束（非 - 开头且非空/非注释）
                          if stripped.strip() and not stripped.lstrip().startswith(('-', '#')):
                              in_block = False
                  else:
                      lines.append(stripped)

          with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")

          print("处理完成，输出路径：", OUTPUT_FILE)
          EOF

      - name: Commit changes if any
        run: |
          set -euo pipefail

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 确保临时文件不被提交
          rm -f /tmp/upstream.yaml upstream.yaml 2>/dev/null || true

          git add -A

          if git diff --staged --quiet; then
            echo "没有变化，跳过提交"
          else
            CHANGED_FILES=$(git diff --staged --name-only | tr '\n' ' ' || true)
            git commit -m "chore: auto update Ads_SukkaW & convert double quotes to single quotes in url_regex_set

          Updated files: ${CHANGED_FILES:-Egern/Rules/Ads_SukkaW.yaml}"
            git push
          fi

      - name: Cleanup (always)
        if: always()
        run: rm -f /tmp/upstream.yaml upstream.yaml 2>/dev/null || true
