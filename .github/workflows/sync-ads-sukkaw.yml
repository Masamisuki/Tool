name: Format YAML Quotes
# 可通過手動在 GitHub 倉庫頁面點擊 "Run workflow" 觸發
on:
  workflow_dispatch:
  # 或設定定期執行
  schedule:
    - cron: '0 16 * * *' # UTC 16:00 即北京時間 00:00

jobs:
  format-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize Quotes in url_regex_set
        run: |
          # 直接修改倉庫中的文件
          # 這裡假設文件路徑為 Egern/Rules/Ads_SukkaW.yaml
          # 如果您倉庫中文件路徑不同，請修改此處
          FILE_PATH="Egern/Rules/Ads_SukkaW.yaml"
          
          # 使用 sed 命令進行替換
          # 1. 匹配以 'url_regex_set:' 開頭的行及其後續行，直到遇到一個不以 '- ' 開頭的行（即列表結束）。
          # 2. 在匹配到的區塊內，將所有雙引號 " 替換為單引號 '。
          sed -i.bak '/url_regex_set:/,/^[^[:space:]-]/s/"/'"'"'/g' "$FILE_PATH"
          
          # 刪除備份文件
          rm -f "$FILE_PATH.bak"
          
          # 顯示修改後的內容以供檢查
          echo "修改後的文件內容："
          cat "$FILE_PATH"

      - name: Check for Changes
        id: file_changed
        run: |
          # 檢查文件是否有變更
          if git diff --no-ext-diff --quiet Egern/Rules/Ads_SukkaW.yaml; then
            echo "No changes detected."
            echo "changes_made=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected, preparing to commit."
            echo "changes_made=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and Push Changes
        if: steps.file_changed.outputs.changes_made == 'true'
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add Egern/Rules/Ads_SukkaW.yaml
          git commit -m "chore(config): standardize quotes in url_regex_set to single quotes [Automated]"
          git push
