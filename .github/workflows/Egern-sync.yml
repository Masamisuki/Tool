name: Sync Upstream Folders to Egern

on:
  schedule:
    - cron: '0 15 * * *' # 北京时间 23:00 自动运行
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      # --- 1. 下载 DNS Mapping 并特殊处理 ByteDance 命名 ---
      - name: Download DNS Mapping
        run: |
          TARGET_DIR="main-repo/Egern/Rules"
          mkdir -p "$TARGET_DIR"
          for site in alibaba tencent bilibili bytedance baidu; do
            # 默认首字母大写
            FILENAME="${site^}.conf"
            
            if [ "$site" = "bytedance" ]; then
              FILENAME="ByteDance.conf"
            fi
            
            curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/${site}.conf" -o "$TARGET_DIR/$FILENAME"
          done

      # --- 2. 同步 Repcz 的 Rules (并进行过滤处理) ---
      - name: Sync From Repcz/Tool (Rules)
        run: |
          git clone --depth 1 -b X https://github.com/Repcz/Tool.git upstream-repcz
          
          # 保护本地 Emby.list 不被覆盖
          if [ -f "main-repo/Egern/Rules/Emby.list" ]; then
            cp main-repo/Egern/Rules/Emby.list /tmp/Emby.list.bak
            HAS_BACKUP=true
          fi

          mkdir -p main-repo/Egern/Rules/
          cp -rf upstream-repcz/Surge/Rules/* main-repo/Egern/Rules/

          # --- 关键修改：删除指定域名的行 ---
          # 使用 sed 删除包含 stat.y.qq.com 的行
          TARGET_FILE="main-repo/Egern/Rules/Ads_SukkaW.list"
          if [ -f "$TARGET_FILE" ]; then
            sed -i '/stat\.y\.qq\.com/d' "$TARGET_FILE"
            echo "Successfully removed stat.y.qq.com from $TARGET_FILE"
          fi

          # 还原本地 Emby.list
          if [ "$HAS_BACKUP" = true ]; then
            cp /tmp/Emby.list.bak main-repo/Egern/Rules/Emby.list
          fi

      # --- 3. 提交并推送 ---
      - name: Commit and Push Changes
        run: |
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto-sync: Filtered Ads_SukkaW.list and Repcz Sync"
            git push
          fi
