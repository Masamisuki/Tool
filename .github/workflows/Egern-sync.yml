name: Egern-sync
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Sync From sooyaaabo/Egern
        run: |
          git clone --depth 1 https://github.com/sooyaaabo/Egern.git upstream-egern
          mkdir -p main-repo/Egern/Module
          cp -rf upstream-egern/Module/* main-repo/Egern/Module/

      - name: Sync From QingRex (Excluding Beta/Official)
        run: |
          git clone --depth 1 https://github.com/QingRex/LoonKissSurge.git upstream-qing
          mkdir -p main-repo/Egern/Sgmodule
          
          # 进入上游 Surge 目录
          cd upstream-qing/Surge
          # 复制所有内容到你的 Sgmodule 目录，但排除 Beta 和 Official
          # 使用 rsync 可以更优雅地排除文件夹
          rsync -av --exclude='Beta' --exclude='Official' . ../../main-repo/Egern/Sgmodule/
          cd ../..

      - name: Sync From Repcz/Tool (With Emby.list Protection)
        run: |
          git clone --depth 1 -b X https://github.com/Repcz/Tool.git upstream-repcz
          
          # 备份本地 Emby.list
          if [ -f "main-repo/Egern/Rules/Emby.list" ]; then
            cp main-repo/Egern/Rules/Emby.list /tmp/Emby.list.bak
            HAS_BACKUP=true
          else
            HAS_BACKUP=false
          fi

          mkdir -p main-repo/Egern/Rules/
          cp -rf upstream-repcz/Surge/Rules/* main-repo/Egern/Rules/

          # 还原本地 Emby.list
          if [ "$HAS_BACKUP" = true ]; then
            cp /tmp/Emby.list.bak main-repo/Egern/Rules/Emby.list
          fi

      - name: Commit and Push Changes
        run: |
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync: $(date +'%Y-%m-%d %H:%M:%S') (Excluded Beta/Official)"
            git push
          fi
