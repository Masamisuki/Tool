name: Sync Upstream Folders to Surge

on:
  schedule:
    - cron: '0 14 * * *' # 每天北京时间 22:00 自动运行
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Sync From sooyaaabo/Egern (Module)
        run: |
          git clone --depth 1 https://github.com/sooyaaabo/Egern.git upstream-egern
          mkdir -p main-repo/Surge/Module
          cp -rf upstream-egern/Module/* main-repo/Surge/Module/

      - name: Sync From QingRex (Sgmodule, Excluding Beta/Official)
        run: |
          git clone --depth 1 https://github.com/QingRex/LoonKissSurge.git upstream-qing
          mkdir -p main-repo/Surge/Sgmodule
          rsync -av --exclude='Beta' --exclude='Official' upstream-qing/Surge/ main-repo/Surge/Sgmodule/

      - name: Sync From Repcz/Tool (Rules, With Emby.list Protection)
        run: |
          git clone --depth 1 -b X https://github.com/Repcz/Tool.git upstream-repcz
          
          # 1. 备份本地 Surge/Rules/Emby.list
          if [ -f "main-repo/Surge/Rules/Emby.list" ]; then
            echo "Backing up local Emby.list..."
            cp main-repo/Surge/Rules/Emby.list /tmp/Emby.list.bak
            HAS_BACKUP=true
          else
            HAS_BACKUP=false
          fi

          # 2. 覆盖同步 Rules 文件夹
          mkdir -p main-repo/Surge/Rules/
          cp -rf upstream-repcz/Surge/Rules/* main-repo/Surge/Rules/

          # 3. 还原本地 Emby.list
          if [ "$HAS_BACKUP" = true ]; then
            echo "Restoring local Emby.list..."
            cp /tmp/Emby.list.bak main-repo/Surge/Rules/Emby.list
          fi

      # 新增：同步 Reject 规则及 ASN.China.list
      - name: Sync Additional Rules
        run: |
          mkdir -p main-repo/Surge/Rules/
          curl -sL "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/domainset/reject.conf" -o main-repo/Surge/Rules/skk_domain_reject.conf
          curl -sL "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/non_ip/reject.conf" -o main-repo/Surge/Rules/skk_non_ip_reject.conf
          curl -sL "https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/ASN.China.list" -o main-repo/Surge/Rules/ASN.China.list

      - name: Commit and Push Changes
        run: |
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto-sync to /Surge: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
