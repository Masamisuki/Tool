name: Sync and Patch Rules

on:
  schedule:
    - cron: '0 15 * * *' # 北京时间 23:00
  workflow_dispatch:

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Patch Specific Files
        run: |
          cd main-repo
          
          # --- 处理 .sgmodule 文件 ---
          SG_FILES=("Egern/Sgmodule/广告平台拦截器.sgmodule" "Surge/Sgmodule/广告平台拦截器.sgmodule")
          
          for file in "${SG_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "Patching $file..."
              sed -i '/stat.y.qq.com,REJECT/d' "$file"
              sed -i '/stat6.y.qq.com,REJECT/d' "$file"
            fi
          done

          # --- 处理 .list 规则集文件 ---
          LIST_FILES=("Egern/Rules/Ads_SukkaW.list" "Surge/Rules/Ads_SukkaW.list")
          
          for file in "${LIST_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "Patching $file..."
              sed -i '/DOMAIN-SUFFIX,stat.y.qq.com/d' "$file"
              sed -i '/DOMAIN-SUFFIX,dataflow.biliapi.com/d' "$file"
            fi
          done

          # --- 处理 skk_domain_reject.conf ---
          CONF_FILE="Surge/Rules/skk_domain_reject.conf"

          if [ -f "$CONF_FILE" ]; then
            echo "Patching $CONF_FILE..."
            sed -i '/\.stat\.y\.qq\.com/d' "$CONF_FILE"
          fi

      - name: Commit and Push Changes
        run: |
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto-sync and Patch: Remove QQ Music & Bilibili stats rules"
            git push
          fi
