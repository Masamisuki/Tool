name: Sync Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          mkdir -p Rules Sgmodule Module temp_sync
          sudo apt-get update
          sudo apt-get install -y rsync

      # ========================
      # ① 同步 Repcz 规则
      # ========================
      - name: 同步 Repcz Rules
        run: |
          cd temp_sync
          git clone --depth=1 https://github.com/Repcz/Tool.git
          cd Tool
          git sparse-checkout init --cone
          git sparse-checkout set Surge/Rules

          rsync -av \
            --exclude='Emby.list' \
            Surge/Rules/ ../../Rules/

      # ========================
      # ② 同步 sooyaaabo 模块
      # ========================
      - name: 同步模块
        run: |
          cd temp_sync
          git clone --depth=1 https://github.com/sooyaaabo/Egern.git
          cd Egern
          git sparse-checkout init --cone
          git sparse-checkout set Sgmodule Module

          rsync -av \
            --exclude='Block_HTTPDNS.sgmodule' \
            --exclude='BlockAdvertisers.sgmodule' \
            Sgmodule/ ../../Sgmodule/

          rsync -av Module/ ../../Module/

      # ========================
      # ③ 强制同步 Ads_SukkaW.list（关键修复）
      # ========================
      - name: 同步 Ads_SukkaW
        run: |
          curl -L -o "Rules/Ads_SukkaW.list" \
          https://raw.githubusercontent.com/Repcz/Tool/refs/heads/X/Surge/Rules/Ads_SukkaW.list

      # ========================
      # ④ 同步 Sukka reject 规则
      # ========================
      - name: 同步 Sukka Reject
        run: |
          curl -L -o "Rules/reject_domainset.conf" \
          https://raw.githubusercontent.com/SukkaW/Surge/master/Reject/reject_domainset.conf

          curl -L -o "Rules/reject_nonip.conf" \
          https://raw.githubusercontent.com/SukkaW/Surge/master/Reject/reject_nonip.conf

      # ========================
      # ⑤ DNS 映射规则
      # ========================
      - name: 同步 DNS 映射
        run: |
          curl -L -o "Rules/Alibaba.conf" \
          https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Alibaba/Alibaba_Domain.conf

          curl -L -o "Rules/Tencent.conf" \
          https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Tencent/Tencent_Domain.conf

      # ========================
      # ⑥ 只清洗 Sukka 规则（避免污染 Ads）
      # ========================
      - name: 清洗规则（精准）
        run: |
          sed -i '/\.stat\.y\.qq\.com/d' Rules/reject_*.conf || true

      # ========================
      # ⑦ 清理临时文件
      # ========================
      - name: 清理缓存
        run: rm -rf temp_sync

      # ========================
      # ⑧ 提交更新
      # ========================
      - name: 提交更改
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add Rules/ Sgmodule/ Module/
          git commit -m "自动同步规则 $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
