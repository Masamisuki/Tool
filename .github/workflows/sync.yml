name: Advanced Rules & Modules Sync

on:
  schedule:
    - cron: '0 16 * * *' # 北京时间 00:00
  workflow_dispatch:

jobs:
  sync_and_clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: main_repo

      - name: Backup Local Protected Files
        run: |
          # 备份 Rules/Emby.list
          [ -f main_repo/Rules/Emby.list ] && cp main_repo/Rules/Emby.list /tmp/Emby.list
          
          # 备份 Sgmodule 特定文件（已移除 HTTPDNS）
          mkdir -p /tmp/sg_backup
          [ -f main_repo/Sgmodule/BlockAdvertisers.sgmodule ] && cp main_repo/Sgmodule/BlockAdvertisers.sgmodule /tmp/sg_backup/
          [ -f main_repo/Sgmodule/HuyaLive.sgmodule ] && cp main_repo/Sgmodule/HuyaLive.sgmodule /tmp/sg_backup/

      - name: Sync Upstream (Repcz & Egern)
        run: |
          # 1. 同步 Repcz Rules
          git clone --depth 1 -b X https://github.com/Repcz/Tool.git repcz_repo
          rm -rf main_repo/Rules
          mkdir -p main_repo/Rules
          cp -rf repcz_repo/Surge/Rules/* main_repo/Rules/

          # 2. 同步 Egern 模块 (格式化 Sgmodule)
          git clone --depth 1 https://github.com/sooyaaabo/Egern.git egern_repo
          rm -rf main_repo/Module main_repo/Sgmodule
          mkdir -p main_repo/Module main_repo/Sgmodule
          cp -rf egern_repo/Module/* main_repo/Module/
          cp -rf egern_repo/Sgmodule/* main_repo/Sgmodule/

      - name: Sync SukkaLab Rules & DNS Mapping
        run: |
          cd main_repo/Rules
          # 下载并清洗 Reject 规则
          curl -sSL https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/domainset/reject.conf -o reject.conf
          sed -i '/.stat.y.qq.com/d' reject.conf
          curl -sSL https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/non_ip/reject.conf -o non_ip_reject.conf

          # 下载并重命名 DNS Mapping
          curl -sSL https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/alibaba.conf -o Alibaba.conf
          curl -sSL https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/tencent.conf -o Tencent.conf
          curl -sSL https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/bilibili.conf -o Bilibili.conf
          curl -sSL https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/bytedance.conf -o ByteDance.conf
          curl -sSL https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/baidu.conf -o Baidu.conf

      - name: Clean Specific Lines in Local Rules
        run: |
          cd main_repo/Rules
          [ -f Ads_SukkaW.list ] && sed -i '/DOMAIN-SUFFIX,stat.y.qq.com/d' Ads_SukkaW.list
          [ -f Ads_AWAvenue.list ] && sed -i '/DOMAIN-SUFFIX,stat.y.qq.com/d' Ads_AWAvenue.list

      - name: Restore Protected Files
        run: |
          # 还原 Emby.list
          [ -f /tmp/Emby.list ] && cp /tmp/Emby.list main_repo/Rules/Emby.list
          
          # 还原 Sgmodule 文件 (BlockAdvertisers & HuyaLive)
          if [ -d /tmp/sg_backup ]; then
            cp -f /tmp/sg_backup/* main_repo/Sgmodule/
          fi

      - name: Commit and Push
        run: |
          cd main_repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto sync: Restore HuyaLive & Clean Tencent stats ($(date +'%Y-%m-%d %H:%M:%S'))"
            git push
          fi
