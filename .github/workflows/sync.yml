name: Sync and Patch Rules

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午8点运行
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Local Backups
        run: |
          # 暂存需要保留的本地文件
          mkdir -p backup
          [ -f Rules/Emby.list ] && cp Rules/Emby.list backup/
          [ -f Sgmodule/Block_HTTPDNS.sgmodule ] && cp Sgmodule/Block_HTTPDNS.sgmodule backup/
          [ -f Sgmodule/BlockAdvertisers.sgmodule ] && cp Sgmodule/BlockAdvertisers.sgmodule backup/

      - name: Sync Upstream 1 (Repcz Rules)
        run: |
          mkdir -p Rules
          curl -sL https://api.github.com/repos/Repcz/Tool/contents/Surge/Rules?ref=X | jq -r '.[] | .download_url' | xargs -n 1 curl -sL --output-dir Rules -O
          # 恢复本地 Emby.list
          [ -f backup/Emby.list ] && cp backup/Emby.list Rules/

      - name: Sync Upstream 2 (Egern Modules)
        run: |
          mkdir -p Sgmodule Module
          # 同步 Sgmodule
          curl -sL https://api.github.com/repos/sooyaaabo/Egern/contents/Sgmodule?ref=main | jq -r '.[] | .download_url' | xargs -n 1 curl -sL --output-dir Sgmodule -O
          # 同步 Module
          curl -sL https://api.github.com/repos/sooyaaabo/Egern/contents/Module?ref=main | jq -r '.[] | .download_url' | xargs -n 1 curl -sL --output-dir Module -O
          # 恢复本地特定模块
          [ -f backup/Block_HTTPDNS.sgmodule ] && cp backup/Block_HTTPDNS.sgmodule Sgmodule/
          [ -f backup/BlockAdvertisers.sgmodule ] && cp backup/BlockAdvertisers.sgmodule Sgmodule/

      - name: Sync Upstream 3 (thNylHx Ads Block)
        run: |
          curl -sL "https://raw.githubusercontent.com/thNylHx/Tools/refs/heads/main/Ruleset/Surge/Block/Ads_Block.list" -o Rules/Ads_Block.list

      - name: Sync Upstream 4 (Sukka Reject & Cleanup)
        run: |
          # 下载并过滤 domainset/reject.conf
          curl -sL "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/domainset/reject.conf" | sed '/.stat.y.qq.com/d' > Rules/reject_domainset.conf
          # 下载 non_ip/reject.conf
          curl -sL "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/non_ip/reject.conf" -o Rules/reject_non_ip.conf

      - name: Sync Upstream 5 (Sukka DNS Mapping)
        run: |
          declare -A dns_files=( 
            ["alibaba.conf"]="Alibaba.conf" 
            ["tencent.conf"]="Tencent.conf" 
            ["bilibili.conf"]="Bilibili.conf" 
            ["bytedance.conf"]="ByteDance.conf" 
            ["baidu.conf"]="Baidu.conf" 
          )
          for src in "${!dns_files[@]}"; do
            curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/$src" -o "Rules/${dns_files[$src]}"
          done

      - name: Final Rules Patching (Clean QQ Stats)
        run: |
          # 处理 Ads_AWAvenue.list 和 Ads_SukkaW.list
          [ -f Rules/Ads_AWAvenue.list ] && sed -i '/DOMAIN-SUFFIX,stat.y.qq.com/d' Rules/Ads_AWAvenue.list
          [ -f Rules/Ads_SukkaW.list ] && sed -i '/DOMAIN-SUFFIX,stat.y.qq.com/d' Rules/Ads_SukkaW.list
          # 处理 Ads_Block.list
          if [ -f Rules/Ads_Block.list ]; then
            sed -i '/DOMAIN,stat.y.qq.com/d' Rules/Ads_Block.list
            sed -i '/DOMAIN,stat6.y.qq.com/d' Rules/Ads_Block.list
          fi

      - name: Git Push Assets
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto Sync: Updated rules and applied patches"
          git push
