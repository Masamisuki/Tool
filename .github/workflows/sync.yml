name: Sync Upstream Rules & Modules

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 2点运行（香港时间早上10点左右）
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl

      - name: Sync Repcz Rules folder (keep Emby.list)
        run: |
          rm -rf /tmp/repcz_rules
          git clone --depth 1 https://github.com/Repcz/Tool.git -b X /tmp/repcz_rules
          mkdir -p Rules
          cp -r /tmp/repcz_rules/Surge/Rules/* Rules/ 2>/dev/null || true
          # 恢复自己的 Emby.list
          if [ -f Rules_backup/Emby.list ]; then
            cp Rules_backup/Emby.list Rules/Emby.list
          fi
          rm -rf /tmp/repcz_rules

      - name: Sync sooyaaabo Sgmodule & Module (keep two custom sgmodule)
        run: |
          rm -rf /tmp/egern
          git clone --depth 1 https://github.com/sooyaaabo/Egern.git /tmp/egern
          # Sgmodule
          mkdir -p Sgmodule
          cp -r /tmp/egern/Sgmodule/* Sgmodule/ 2>/dev/null || true
          # 恢复自己的两个模块
          cp Sgmodule_backup/Block_HTTPDNS.sgmodule Sgmodule/ 2>/dev/null || true
          cp Sgmodule_backup/BlockAdvertisers.sgmodule Sgmodule/ 2>/dev/null || true
          # Module
          mkdir -p Module
          cp -r /tmp/egern/Module/* Module/ 2>/dev/null || true
          rm -rf /tmp/egern

      - name: Download single ruleset (thNylHx Ads_Block.list)
        run: |
          mkdir -p Rules
          curl -L -o Rules/Ads_Block.list "https://raw.githubusercontent.com/thNylHx/Tools/refs/heads/main/Ruleset/Surge/Block/Ads_Block.list"

      - name: Download SukkaLab reject rules + remove stat.y.qq.com
        run: |
          mkdir -p Rules
          curl -L -o Rules/reject.conf "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/domainset/reject.conf"
          curl -L -o Rules/reject_non_ip.conf "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/non_ip/reject.conf"
          # 删除 stat.y.qq.com 行
          sed -i '/stat\.y\.qq\.com/d' Rules/reject.conf

      - name: Download sukka_local_dns_mapping and rename
        run: |
          mkdir -p Rules
          curl -L -o Rules/Alibaba.conf "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/alibaba.conf"
          curl -L -o Rules/Tencent.conf "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/tencent.conf"
          curl -L -o Rules/Bilibili.conf "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/bilibili.conf"
          curl -L -o Rules/ByteDance.conf "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/bytedance.conf"
          curl -L -o Rules/Baidu.conf "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/baidu.conf"

      - name: Apply custom modifications (remove stat.y.qq.com lines)
        run: |
          # Ads_AWAvenue.list
          sed -i '/DOMAIN-SUFFIX,stat\.y\.qq\.com/d' Rules/Ads_AWAvenue.list || true
          # Ads_SukkaW.list
          sed -i '/DOMAIN-SUFFIX,stat\.y\.qq\.com/d' Rules/Ads_SukkaW.list || true
          # Ads_Block.list (your version after download)
          sed -i '/DOMAIN,stat\.y\.qq\.com/d' Rules/Ads_Block.list || true
          sed -i '/DOMAIN,stat6\.y\.qq\.com/d' Rules/Ads_Block.list || true
          sed -i '/DOMAIN-SUFFIX,stat\.y\.qq\.com/d' Rules/Ads_Block.list || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Rules/ Sgmodule/ Module/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync upstream rules and modules + custom modifications"
            git push
          fi
