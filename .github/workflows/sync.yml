name: Sync Rules & Modules from Upstream

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点运行（北京时间早上 8 点）
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run synchronization script
        run: python sync_upstream.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Rules/ Sgmodule/ Module/
          git diff --staged --quiet || git commit -m "chore: sync rules & modules from upstream + custom modifications"
          git push
