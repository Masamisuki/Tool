name: Auto Sync Tool (Final Version)
on:
  schedule:
    - cron: '0 0 * * *' # 每日北京时间 8:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4

      - name: Sync Egern Modules (Smart Protection)
        run: |
          git clone --depth 1 https://github.com/sooyaaabo/Egern.git upstream_egern
          mkdir -p Module Sgmodule
          
          # Module: 全量覆盖同步
          cp -rf upstream_egern/Module/* ./Module/
          
          # Sgmodule: 变动检测逻辑
          echo "Checking Sgmodule files for changes..."
          for remote_file in upstream_egern/Sgmodule/*; do
            filename=$(basename "$remote_file")
            local_file="./Sgmodule/$filename"
            
            if [ -f "$local_file" ]; then
              local_md5=$(md5sum "$local_file" | awk '{print $1}')
              remote_md5=$(md5sum "$remote_file" | awk '{print $1}')
              
              if [ "$local_md5" != "$remote_md5" ]; then
                echo "Skipping $filename: Local version has custom changes."
                continue
              fi
            fi
            cp -f "$remote_file" "$local_file"
          done
          rm -rf upstream_egern

      - name: Sync Repcz Rules (Preserve Emby.list)
        run: |
          git clone --depth 1 -b X https://github.com/Repcz/Tool.git upstream_repcz
          mkdir -p Rules
          
          # 备份本地 Emby.list
          if [ -f "Rules/Emby.list" ]; then
            mv Rules/Emby.list Rules/Emby.list.bak
          fi
          
          cp -rf upstream_repcz/Surge/Rules/* ./Rules/
          
          # 还原本地 Emby.list
          if [ -f "Rules/Emby.list.bak" ]; then
            mv -f Rules/Emby.list.bak Rules/Emby.list
          fi
          rm -rf upstream_repcz

      - name: Sync External List & DNS Rules
        run: |
          mkdir -p Rules
          # 1. SKK DNS 映射下载与重命名
          curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/alibaba.conf" -o Rules/Alibaba.conf
          curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/tencent.conf" -o Rules/Tencent.conf
          curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/bilibili.conf" -o Rules/bilibili.conf
          cp Rules/bilibili.conf Rules/Bilibili.conf
          curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/bytedance.conf" -o Rules/ByteDance.conf
          curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/baidu.conf" -o Rules/Baidu.conf

          # 2. SukkaLab Reject 规则
          curl -sL "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/domainset/reject.conf" -o Rules/domainset_reject.conf
          curl -sL "https://raw.githubusercontent.com/SukkaLab/ruleset.skk.moe/refs/heads/master/List/non_ip/reject.conf" -o Rules/non_ip_reject.conf

          # 3. 新增：Ads_Block.list 同步
          curl -sL "https://raw.githubusercontent.com/thNylHx/Tools/refs/heads/main/Ruleset/Surge/Block/Ads_Block.list" -o Rules/Ads_Block.list

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Sync: $(date +'%Y-%m-%d %H:%M')" && git push)
