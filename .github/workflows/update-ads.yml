name: Auto Fix & Update Ads_SukkaW.yaml

on:
  schedule:
    - cron: '0 5 * * *'          # Daily at 05:00 UTC (~13:00 Beijing time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download latest version
        run: |
          curl -L -o Egern/Rules/Ads_SukkaW.yaml.new \
            https://raw.githubusercontent.com/Masamisuki/Tool/refs/heads/main/Egern/Rules/Ads_SukkaW.yaml

      - name: Fix url_regex_set YAML syntax
        run: |
          # Optional backup (won't fail if original missing)
          cp Egern/Rules/Ads_SukkaW.yaml Egern/Rules/Ads_SukkaW.yaml.bak 2>/dev/null || true

          # Fix the three lines — add single quotes
          sed -i 's|^\(\s*-\s*\)/\d\+/resolve\s*$|\1'\''/\d\+/resolve'\''|' Egern/Rules/Ads_SukkaW.yaml.new || true
          sed -i 's|^\(\s*-\s*\)/\d\+/sign_d\s*$|\1'\''/\d\+/sign_d'\''|'   Egern/Rules/Ads_SukkaW.yaml.new || true
          sed -i 's|^\(\s*-\s*\)/igd\\.xml\s*$|\1'\''/igd\\.xml'\''|'       Egern/Rules/Ads_SukkaW.yaml.new || true

          # Also handle cases where double quotes exist without proper escape
          sed -i 's|^\(\s*-\s*\)"/\d\+/resolve"\s*$|\1'\''/\d\+/resolve'\''|' Egern/Rules/Ads_SukkaW.yaml.new || true
          sed -i 's|^\(\s*-\s*\)"/\d\+/sign_d"\s*$|\1'\''/\d\+/sign_d'\''|'   Egern/Rules/Ads_SukkaW.yaml.new || true
          sed -i 's|^\(\s*-\s*\)"/igd\\.xml"\s*$|\1'\''/igd\\.xml'\''|'       Egern/Rules/Ads_SukkaW.yaml.new || true

      - name: Commit changes if any
        run: |
          mv Egern/Rules/Ads_SukkaW.yaml.new Egern/Rules/Ads_SukkaW.yaml || true

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add Egern/Rules/Ads_SukkaW.yaml

          # Commit only if there is a real difference
          git diff --staged --quiet || git commit -m "chore: auto-fix url_regex_set YAML syntax"

          git push origin main || echo "No changes or push skipped"

      - name: Show last commit (debug)
        run: git log -1 --pretty=%B || true