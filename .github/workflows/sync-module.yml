Name: Sync Egern Module

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clone upstream Egern repo
      run: |
        git clone --depth=1 https://github.com/sooyaaabo/Egern.git upstream

    - name: Sync Module folder
      run: |
        # 创建目录（防止首次运行不存在）
        mkdir -p Surge/Sgmodule
        mkdir -p Egern/Module

        # 同步上游模块（不删除您原有的模块，仅覆盖同名文件）
        cp -r upstream/Module/* Surge/Sgmodule/ 2>/dev/null || true
        cp -r upstream/Module/* Egern/Module/ 2>/dev/null || true

    - name: 下载并自定义 BlockAdvertisers.sgmodule
      run: |
        # 下载原始模块
        curl -L -o /tmp/BlockAdvertisers.sgmodule https://kelvinlab.wuyra.com/Module/BlockAdvertisers.sgmodule

        # 删除指定的两条规则（精确匹配整行）
        sed '/^DOMAIN,stat\.y\.qq\.com,REJECT$/d;/^DOMAIN,stat6\.y\.qq\.com,REJECT$/d' /tmp/BlockAdvertisers.sgmodule Surge/Sgmodule/BlockAdvertisers.sgmodule

        # 复制到另一个文件夹
        cp Surge/Sgmodule/BlockAdvertisers.sgmodule Egern/Module/BlockAdvertisers.sgmodule

        # 清理临时文件
        rm -f /tmp/BlockAdvertisers.sgmodule

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add Surge/Sgmodule
        git add Egern/Module

        git diff --quiet --cached && echo "No changes" && exit 0

        git commit -m "🔄 Sync Egern Module"
        git push