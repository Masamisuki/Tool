name: Sync Egern Module

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clone upstream Egern repo
      run: |
        git clone --depth=1 https://github.com/sooyaaabo/Egern.git upstream

    - name: Sync Module folder
      run: |
        # 1. 确保目录存在
        mkdir -p Surge/Sgmodule
        mkdir -p Egern/Module

        # 2. 同步上游仓库的文件
        cp -r upstream/Module/* Surge/Sgmodule/
        cp -r upstream/Module/* Egern/Module/

        # 3. 从本地仓库复制自定义模块
        cp LocalModules/BlockAdvertisers.sgmodule Surge/Sgmodule/
        cp LocalModules/BlockAdvertisers.sgmodule Egern/Module/

        # 4. 删除模块中特定的配置行
        sed -i '/DOMAIN,stat.y.qq.com,REJECT/d' Surge/Sgmodule/BlockAdvertisers.sgmodule
        sed -i '/DOMAIN,stat6.y.qq.com,REJECT/d' Surge/Sgmodule/BlockAdvertisers.sgmodule
        
        sed -i '/DOMAIN,stat.y.qq.com,REJECT/d' Egern/Module/BlockAdvertisers.sgmodule
        sed -i '/DOMAIN,stat6.y.qq.com,REJECT/d' Egern/Module/BlockAdvertisers.sgmodule

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --quiet --cached && echo "No changes detected, skipping commit." && exit 0
        git commit -m "🔄 Sync Egern Module & Custom Mod"
        git push
