name: Sync Egern Module

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clone upstream Egern repo
      run: |
        git clone --depth=1 https://github.com/sooyaaabo/Egern.git upstream

    - name: Sync Module folder
      run: |
        # 确保目录存在
        mkdir -p Surge/Sgmodule
        mkdir -p Egern/Module

        # 同步文件：只复制覆盖，保留你手动添加的其他文件
        cp -r upstream/Module/* Surge/Sgmodule/
        cp -r upstream/Module/* Egern/Module/

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 添加修改
        git add Surge/Sgmodule
        git add Egern/Module

        # 检查是否有变更，没有变更则直接退出，避免产生空 commit
        git diff --quiet --cached && echo "No changes detected, skipping commit." && exit 0

        git commit -m "🔄 Sync Egern Module"
        git push
