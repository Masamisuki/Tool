name: Auto Update Ads List

on:
  schedule:
    # 每天北京时间 23:00 运行 (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Process File
        run: |
          # 创建目录（以防万一）
          mkdir -p Surge/Rules
          
          # 下载上游文件
          curl -sSL "https://raw.githubusercontent.com/Repcz/Tool/refs/heads/X/Surge/Rules/Ads_SukkaW.list" -o Surge/Rules/Ads_SukkaW.list
          
          # 使用 sed 删除包含 DOMAIN-SUFFIX,stat.y.qq.com 的行
          # 注意：这里匹配整行内容
          sed -i '/DOMAIN-SUFFIX,stat.y.qq.com/d' Surge/Rules/Ads_SukkaW.list
          
          echo "文件处理完成。"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有内容变更
          if git diff --quiet; then
            echo "没有内容更新，跳过提交。"
          else
            git add Surge/Rules/Ads_SukkaW.list
            git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S') (Excluded stat.y.qq.com)"
            git push
          fi
