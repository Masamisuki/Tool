name: Sync Surge Rules

on:
  schedule:
    - cron: '0 3 * * *'   # 每天 UTC 03:00 (北京时间11点)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone upstream repo
        run: |
          git clone --depth=1 -b X https://github.com/Repcz/Tool.git upstream

      - name: Sync Rules
        run: |
          mkdir -p Surge/Rules

          # 备份自己的 Emby.list
          if [ -f Surge/Rules/Emby.list ]; then
            cp Surge/Rules/Emby.list Emby.list.bak
          fi

          # 删除旧规则
          rm -rf Surge/Rules/*

          # 复制上游规则
          cp -r upstream/Surge/Rules/* Surge/Rules/

          # 恢复自己的 Emby.list
          if [ -f Emby.list.bak ]; then
            mv Emby.list.bak Surge/Rules/Emby.list
          fi

      - name: Commit changes
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "github-actions"

          git add Surge/Rules

          if ! git diff --staged --quiet; then
            git commit -m "Auto Sync Surge Rules"
            git push
          else
            echo "No changes"
          fi
