name: Sync Surge Rules

on:
  schedule:
    # 每天凌晨 0 点运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你手动在 GitHub 页面点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限
    steps:
      - name: Checkout downstream repository
        uses: actions/checkout@v4

      - name: Setup temporary directory
        run: mkdir -p upstream_tmp

      - name: Clone upstream repository
        run: |
          git clone --depth 1 https://github.com/Repcz/Tool.git upstream_tmp

      - name: Sync files with exclusion
        run: |
          # 使用 rsync 同步，--exclude 确保 Emby.list 不被覆盖
          # 请根据实际路径调整，这里假设上游仓库文件夹结构为 Surge/Rules
          rsync -av --exclude='Emby.list' upstream_tmp/X/Surge/Rules/ ./Surge/Rules/

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ./Surge/Rules/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Auto-sync rules from Repcz/Tool, excluding Emby.list"
            git push
          fi
