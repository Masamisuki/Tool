Name: Unified Rules Sync & Update

on:
  schedule:
    # 统一在北京时间 23:00 运行 (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch: # 允许手动运行

permissions:
  contents: write

jobs:
  sync-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      ##########################################################
      # 1. 同步上游 Repcz/Tool (Surge & Egern)
      ##########################################################
      - name: Sync Repcz Rules
        run: |
          set -e
          git clone --depth=1 -b X https://github.com/Repcz/Tool.git upstream_repcz
          
          # 处理 Surge 规则
          mkdir -p Surge/Rules
          [ -f Surge/Rules/Emby.list ] && cp Surge/Rules/Emby.list Emby.list.bak
          rm -rf Surge/Rules/*
          cp -r upstream_repcz/Surge/Rules/* Surge/Rules/
          [ -f Emby.list.bak ] && mv Emby.list.bak Surge/Rules/Emby.list
          
          # 处理 Egern 规则
          mkdir -p Egern/Rules
          # 排除掉需要特殊处理或保留的文件，其余同步
          rsync -av --exclude='Emby.yaml' --exclude='Ads_SukkaW.yaml' upstream_repcz/Egern/Rules/ Egern/Rules/

      ##########################################################
      # 2. 特殊处理 Ads_SukkaW (Surge 删除特定行 / Egern Python 替换引号)
      ##########################################################
      - name: Process Ads_SukkaW
        run: |
          # Surge 版：删除包含特定域名的行 (stat.y.qq.com 和 dataflow.biliapi.com)
          sed -i '/DOMAIN-SUFFIX,stat.y.qq.com/d' Surge/Rules/Ads_SukkaW.list
          sed -i '/DOMAIN-SUFFIX,dataflow.biliapi.com/d' Surge/Rules/Ads_SukkaW.list

          # Egern 版：Python 处理 url_regex_set 双引号转单引号
          python3 - <<'EOF'
          import re
          import os
          input_file = "upstream_repcz/Egern/Rules/Ads_SukkaW.yaml"
          output_file = "Egern/Rules/Ads_SukkaW.yaml"
          lines, in_block = [], False
          if os.path.exists(input_file):
              with open(input_file, "r", encoding="utf-8") as f:
                  for line in f:
                      stripped = line.rstrip("\n")
                      if stripped.startswith("url_regex_set:"):
                          in_block = True
                          lines.append(stripped)
                          continue
                      if in_block:
                          # 匹配缩进、横杠、双引号内容
                          match = re.match(r'^(\s*-\s*)"([^"]*)"$', stripped)
                          if match:
                              # 转换为单引号
                              lines.append(f"{match.group(1)}'{match.group(2)}'")
                          else:
                              lines.append(stripped)
                              # 判断块是否结束
                              if stripped.strip() and not stripped.lstrip().startswith(('-', '#')):
                                  in_block = False
                      else:
                          lines.append(stripped)
              with open(output_file, "w", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")
          EOF

      ##########################################################
      # 3. 下载 DNS Mapping & 处理 AdBlock_Egern
      ##########################################################
      - name: Download DNS and AdBlock
        run: |
          # Sukka DNS Mapping
          TARGET_DIR="Egern/Rules"
          for site in alibaba tencent bilibili bytedance baidu; do
            curl -sL "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/${site}.conf" -o "$TARGET_DIR/${site^}.conf"
          done

          # AdBlock_Egern 处理 (过滤并替换 Surge 为 Egern)
          curl -sL https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblocksurge.list -o temp_adblock.list
          awk '
            /^\.stat6?\.y\.qq\.com$/ { next }
            /^#!name=/ || /^#!desc=/ { gsub(/Surge/, "Egern"); print; next }
            /^#/ { next }
            { print }
          ' temp_adblock.list > "$TARGET_DIR/AdBlock_Egern.list"
          rm -f temp_adblock.list

      ##########################################################
      # 4. 同步 Egern Module 模块
      ##########################################################
      - name: Sync Egern Module
        run: |
          git clone --depth=1 https://github.com/sooyaaabo/Egern.git upstream_egern
          mkdir -p Surge/Sgmodule Egern/Module
          cp -r upstream_egern/Module/* Surge/Sgmodule/
          cp -r upstream_egern/Module/* Egern/Module/

      ##########################################################
      # 5. 提交变更
      ##########################################################
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add Surge/ Egern/
          
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto Sync & Update: $(date +'%Y-%m-%d %H:%M:%S') (Unified)"
            git push
          fi
